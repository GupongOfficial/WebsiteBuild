name: Automated App Builder

on:
  repository_dispatch:
    types: [trigger-build]

jobs:
  build-app:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # =================================================================
      # LOGIK UTAMA UNTUK TIPE 1: URL BUILD (WEBVIEW)
      # =================================================================
      - name: Auto Create Flutter Project (URL Type Only)
        if: ${{ github.event.client_payload.build_type == 'url' }}
        run: |
          if [ ! -f "pubspec.yaml" ]; then
            flutter create . --org com.appkonverter --project-name webview_app
          fi

      - name: Configure App Name and Launcher Icon (URL Type Only)
        if: ${{ github.event.client_payload.build_type == 'url' }}
        run: |
          ICON_URL="${{ github.event.client_payload.app_icon }}"
          
          flutter pub add rename_app --dev
          flutter pub add flutter_launcher_icons --dev
          flutter pub add webview_flutter

          mkdir -p assets
          if [ ! -z "$ICON_URL" ]; then
            curl -L -o assets/icon.png "$ICON_URL"
          else
            cp android/app/src/main/res/mipmap-mdpi/ic_launcher.png assets/icon.png
          fi

          cat << 'EOF' > flutter_launcher_icons.yaml
          flutter_launcher_icons:
            android: "launcher_icon"
            ios: true
            image_path: "assets/icon.png"
            remove_alpha_ios: true
          EOF

      - name: Configure WebView App Logic (URL Type Only)
        if: ${{ github.event.client_payload.build_type == 'url' }}
        run: |
          cat << 'EOF' > lib/main.dart
          import 'package:flutter/material.dart';
          import 'package:webview_flutter/webview_flutter.dart';

          void main() => runApp(const MyApp());

          class MyApp extends StatelessWidget {
            const MyApp({super.key});
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: '${{ github.event.client_payload.app_name }}',
                debugShowCheckedModeBanner: false,
                home: const WebViewScreen(),
              );
            }
          }

          class WebViewScreen extends StatefulWidget {
            const WebViewScreen({super.key});
            @override
            State<WebViewScreen> createState() => _WebViewScreenState();
          }

          class _WebViewScreenState extends State<WebViewScreen> {
            late final WebViewController _controller;

            String urlMurni(String url) {
              return url.endsWith('/') ? url.substring(0, url.length - 1) : url;
            }

            @override
            void initState() {
              super.initState();
              
              final String inputUrl = '${{ github.event.client_payload.url_link }}';
              final String urlAwal = urlMurni(inputUrl);
              
              _controller = WebViewController()
                ..setJavaScriptMode(JavaScriptMode.unrestricted)
                ..setNavigationDelegate(
                  NavigationDelegate(
                    onNavigationRequest: (NavigationRequest request) {
                      if (request.url.endsWith('/')) {
                        _controller.loadRequest(Uri.parse(urlMurni(request.url)));
                        return NavigationDecision.prevent;
                      }
                      return NavigationDecision.navigate;
                    },
                  ),
                )
                ..loadRequest(Uri.parse(urlAwal));
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                body: SafeArea(
                  child: WebViewWidget(controller: _controller),
                ),
              );
            }
          }
          EOF

      - name: Inject Network & Manifest Configuration (URL Type Only)
        if: ${{ github.event.client_payload.build_type == 'url' }}
        run: |
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST_PATH" ]; then
            sed -i 's/<application/<application android:usesCleartextTraffic="true"/g' "$MANIFEST_PATH"
          fi

      - name: Apply System Modifications (URL Type Only)
        if: ${{ github.event.client_payload.build_type == 'url' }}
        run: |
          flutter pub get
          dart run rename_app:main all="${{ github.event.client_payload.app_name }}"
          dart run flutter_launcher_icons


      # =================================================================
      # LOGIK UTAMA UNTUK TIPE 2: FLUTTER BUILD (ZIP)
      # =================================================================
      - name: Download and Extract Custom Flutter Project (Flutter Type Only)
        if: ${{ github.event.client_payload.build_type == 'flutter' }}
        run: |
          echo "Mengunduh file base.zip..."
          
          # Ambil URL dan token dari payload
          ZIP_URL="${{ github.event.client_payload.zip_url }}"
          GITHUB_TOKEN="${{ github.event.client_payload.github_token }}"
          
          # Encode URL untuk menghindari karakter khusus
          ENCODED_URL=$(echo "$ZIP_URL" | sed 's/ /%20/g' | sed 's/(/%28/g' | sed 's/)/%29/g' | sed 's/\[/%5B/g' | sed 's/\]/%5D/g')
          
          echo "URL yang digunakan: $ENCODED_URL"
          
          # Unduh file dengan header authorization
          curl -L -H "Authorization: token $GITHUB_TOKEN" -o base.zip "$ENCODED_URL"
          
          # Cek apakah file berhasil diunduh
          if [ ! -f "base.zip" ] || [ ! -s "base.zip" ]; then
            echo "Error: Gagal mengunduh base.zip!"
            exit 1
          fi
          
          echo "File berhasil diunduh. Mengekstrak..."
          unzip -o base.zip -d .
          
          # Cek apakah ekstraksi berhasil
          if [ $? -ne 0 ]; then
            echo "Error: Gagal mengekstrak base.zip!"
            exit 1
          fi
          
          rm -f base.zip
          echo "Ekstraksi selesai!"

      # =================================================================
      # DETEKSI DAN BUILD PROSES GLOBAL (BERLAKU UNTUK KEDUA TIPE)
      # =================================================================
      - name: Detect Flutter Project Root Directory
        id: locate-root
        run: |
          # Cari pubspec.yaml di direktori saat ini dan subdirektori
          PUBSPEC_PATH=$(find . -name "pubspec.yaml" -not -path "./android/*" -not -path "./ios/*" -not -path "./build/*" -not -path "./.dart_tool/*" -print -quit)
          
          if [ -z "$PUBSPEC_PATH" ]; then
            echo "Error: File pubspec.yaml tidak ditemukan!"
            echo "Mencoba membuat project Flutter baru..."
            flutter create . --org com.appkonverter --project-name flutter_app
            PUBSPEC_PATH="pubspec.yaml"
          fi
          
          PROJECT_DIR=$(dirname "$PUBSPEC_PATH")
          echo "Proyek Flutter aktif di: $PROJECT_DIR"
          echo "dir=$PROJECT_DIR" >> $GITHUB_OUTPUT

      - name: Finalize Dependencies
        working-directory: ${{ steps.locate-root.outputs.dir }}
        run: |
          flutter pub get
          # Jika gagal, coba clean
          if [ $? -ne 0 ]; then
            flutter clean
            flutter pub get
          fi

      - name: Compile to Release APK
        working-directory: ${{ steps.locate-root.outputs.dir }}
        run: |
          flutter build apk --release
          # Jika gagal, coba dengan verbose untuk debugging
          if [ $? -ne 0 ]; then
            flutter build apk --release --verbose
          fi

      - name: Export Output App Build
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.client_payload.app_name }}-Release-APK
          path: ${{ steps.locate-root.outputs.dir }}/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

      - name: Fallback - Check if APK exists in default location
        if: failure()
        run: |
          echo "Mencari APK di lokasi default..."
          find . -name "*.apk" -type f
