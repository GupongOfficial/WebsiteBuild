name: Automated App Builder

on:
  repository_dispatch:
    types: [trigger-build]

jobs:
  build-app:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # --- PROSES UNTUK TIPE: URL (WEBVIEW) ---
      - name: Configure WebView App
        if: ${{ github.event.client_payload.build_type == 'url' }}
        run: |
          echo "Membuat aplikasi WebView untuk: ${{ github.event.client_payload.app_name }}"
          
          # 1. Tambahkan dependency webview
          flutter pub add webview_flutter
          
          # 2. Inject URL dan Nama Aplikasi ke main.dart
          cat << 'EOF' > lib/main.dart
          import 'package:flutter/material.dart';
          import 'package:webview_flutter/webview_flutter.dart';

          void main() => runApp(const MyApp());

          class MyApp extends StatelessWidget {
            const MyApp({super.key});
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: '${{ github.event.client_payload.app_name }}',
                debugShowCheckedModeBanner: false,
                home: const WebViewScreen(),
              );
            }
          }

          class WebViewScreen extends StatefulWidget {
            const WebViewScreen({super.key});
            @override
            State<WebViewScreen> createState() => _WebViewScreenState();
          }

          class _WebViewScreenState extends State<WebViewScreen> {
            late final WebViewController _controller;

            @override
            void main() {
              super.main();
              _controller = WebViewController()
                ..setJavaScriptMode(JavaScriptMode.unrestricted)
                ..loadRequest(Uri.parse('${{ github.event.client_payload.url_link }}'));
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                body: SafeArea(child: WebViewWidget(controller: _controller)),
              );
            }
          }
          EOF

      # --- PROSES UNTUK TIPE: FLUTTER (ZIP SOURCE) ---
      - name: Extract Flutter Source Code
        if: ${{ github.event.client_payload.build_type == 'flutter' }}
        run: |
          echo "Mengunduh dan mengekstrak source code Flutter..."
          curl -L -H "Authorization: token ${{ github.event.client_payload.github_token }}" \
            -o base.zip "${{ github.event.client_payload.zip_url }}"
          unzip -o base.zip -d .
          rm base.zip

      # --- PROSES BUILD UTAMA ---
      - name: Install Dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release

      # --- GENERATE LINK DOWNLOAD VIA ARTIFACT ---
      - name: Upload APK Release
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.client_payload.app_name }}-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 1
