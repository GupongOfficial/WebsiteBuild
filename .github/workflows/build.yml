name: Automated App Builder

on:
  repository_dispatch:
    types: [trigger-build]

jobs:
  build-app:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # Menggunakan Flutter versi stabil yang dijamin kompetibel dengan webview
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # MENCIPTAKAN PROYEK FLUTTER OTOMATIS JIKA BELUM ADA DI GITHUB
      - name: Auto Create Flutter Project
        run: |
          if [ ! -f "pubspec.yaml" ]; then
            echo "Mendeteksi repositori kosong. Membuat template proyek Flutter..."
            flutter create . --org com.appkonverter --project-name webview_app
          fi

      # MENGONFIGURASI APLIKASI WEBVIEW BERDASARKAN INPUT DARI WEBSITE
      - name: Configure WebView App
        run: |
          echo "Membuat aplikasi WebView untuk: ${{ github.event.client_payload.app_name }}"
          
          # Menambahkan library WebView resmi ke dalam proyek
          flutter pub add webview_flutter
          
          # Membuat ulang file main.dart dengan pengaturan URL dari website Anda
          cat << 'EOF' > lib/main.dart
          import 'package:flutter/material.dart';
          import 'package:webview_flutter/webview_flutter.dart';

          void main() => runApp(const MyApp());

          class MyApp extends StatelessWidget {
            const MyApp({super.key});
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: '${{ github.event.client_payload.app_name }}',
                debugShowCheckedModeBanner: false,
                home: const WebViewScreen(),
              );
            }
          }

          class WebViewScreen extends StatefulWidget {
            const WebViewScreen({super.key});
            @override
            State<WebViewScreen> createState() => _WebViewScreenState();
          }

          class _WebViewScreenState extends State<WebViewScreen> {
            late final WebViewController _controller;

            @override
            void initState() {
              super.initState();
              _controller = WebViewController()
                ..setJavaScriptMode(JavaScriptMode.unrestricted)
                ..loadRequest(Uri.parse('${{ github.event.client_payload.url_link }}'));
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                body: SafeArea(
                  child: WebViewWidget(controller: _controller),
                ),
              );
            }
          }
          EOF

      # PROSES INSTALASI DAN BUILD APK DI SERVER GITHUB
      - name: Install Dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release

      # MENGIRIMKAN HASIL JADI KE HALAMAN ACTIONS UNTUK DI-DOWNLOAD
      - name: Upload APK Release
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.client_payload.app_name }}-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 1
